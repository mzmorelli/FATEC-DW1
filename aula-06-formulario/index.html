<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
</head>
<body>
    <header>
        <h1>Formulário de cadastro</h1>
    </header>
    <main>
        <section>
            <!-- Formulário -->
            <form action="sucesso.html" method="POST">
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <label for="nome">Nome Completo</label><br>
                    <input type="text" name="nome" id="nome" placeholder="Insira o seu nome completo" required><br><br>
                    <label for="email">E-mail</label><br>
                    <input type="email" name="email" id="email" placeholder="exemplo@gmail.com" required><br><br>
                    <label for="password">Senha</label><br>
                    <input type="password" name="password" id="password" placeholder="Insira sua senha" required><br><br>
                    <label for="nascimento">Data de Nascimento</label><br>
                    <input type="date" name="nascimento" id="nascimento" required><br><br>
                    <label for="sexo">Sexo</label><br>
                    <input type="radio" name="sexo" id="masc" value="m">Masculino
                    <input type="radio" name="sexo" id="fem" value="f">Feminino<br><br>
                </fieldset><br>
                <fieldset>
                    <legend>Dados do produto</legend>
                    <label for="quantidade">Quantidade</label><br>
                    <input type="number" name="quantidade" id="quantidade" min="1" max="10"><br><br>
                    <label for="cor">Cor</label><br>
                    <input type="color" name="cor" id="cor"><br><br>
                    <label for="entrega">Agendar entrega</label><br>
                    <input type="datetime-local" name="entrega" id="entrega"><br><br>
                    <label for="frete">Selecione o frete</label><br>
                    <select name="frete" id="frete">
                        <option value="PAC">PAC</option>
                        <option value="sedex">Sedex</option>
                        <option value="sedex10">Sedex 10</option>
                    </select><br><br>
                    <label for="observacoes">Observações</label><br>
                    <textarea name="observacoes" id="observacoes" rows="5" cols="30"></textarea><br><br>
                    <input type="checkbox" name="termos" id="termos">Li e aceito os termos de uso da plataforma. <br><br>

                    <button type="button">Ler os termos de uso</button><br><br>
                    <hr><br>
                    <button type="submit">Enviar</button>
                    <button type="reset">Limpar</button>
                </fieldset>
            </form>
        </section>
    </main>
</body>
</html>
