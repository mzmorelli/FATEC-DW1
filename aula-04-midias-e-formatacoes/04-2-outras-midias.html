<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outras Mídias no HTML5</title>
</head>
<body>
    <header>
        <h1>Outras mídias no HTML5</h1>
    </header>
    <main>
        <section>
            <h2>Áudio</h2>
            <audio controls src="midias/audio.mp3"></audio>
            <br>

            <h2>Vídeo</h2>
            <video controls src="midias/video.mp4" type="video/mp4" width="500px">
                Vídeo não encontrado ou não suportado.
            </video>
            <br>
            <!-- O texto entre a tag video é a mensagem de erro que irá aparecer caso o vídeo não funcione. -->

            <h2>Vídeo do YouTube (externo) - iFrame</h2>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/5QXC42wRuJ4?si=4OmJGsJ_80ewtguA" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </section>
    </main>
</body>
</html>
