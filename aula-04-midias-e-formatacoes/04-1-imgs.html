<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria de Fotos</title>
  </head>
  <body>
    <header>
      <h1>Galeria de Fotos</h1>
    </header>

    <main>
        <section>
            <!-- Importando imagem local -->
            <img src="midias/imagem.jpg" alt="Paisagem" width="300px" height="300px">
            <br><br><br>

            <!-- Importando imagem externa -->
            <img src="https://picsum.photos/id/42/300/200" alt="Imagem 01">
            <img src="https://picsum.photos/id/93/300/200" alt="Imagem 02">
            <img src="https://picsum.photos/id/521/300/200" alt="Imagem 03">
            <img src="https://picsum.photos/id/54/300/200" alt="Imagem 04">
            <img src="https://picsum.photos/id/92/300/200" alt="Imagem 05">
            <img src="https://picsum.photos/id/14/300/200" alt="Imagem 06">
            <img src="https://picsum.photos/id/2/300/200" alt="Imagem 07">
            <img src="https://picsum.photos/id/65/300/200" alt="Imagem 08">
            <img src="https://picsum.photos/id/49/300/200" alt="Imagem 09">
            <img src="https://picsum.photos/id/80/300/200" alt="Imagem 10">
        </section>
        <br><br><br>

        <!-- Imagem com legenda -->
         <section>
            <figure>
                <img src="midias/grafico.png" alt="Gráfico de crescimento anual da empresa." width="300px" height="300px">
                <figcaption>Gráfico de crescimento da empresa no ano de 2025.</figcaption>
            </figure>
         </section>
    </main>
    <hr>
    <footer>
        <p><em>&copy; 2026 - FATEC Registro - DSM</em></p>
    </footer>
  </body>
</html>
