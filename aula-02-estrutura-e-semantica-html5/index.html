<!-- Estrutura básica HTML -->

<!doctype html>
<!-- Diz ao navegador para utilizar a última versão do HTML -->

<html lang="pt-br">
<!-- Atributo lang informa o idioma do site -->

<!-- No head irão as metatags (metadados - informações do site) -->
<head>
    <meta charset="UTF-8" />
    <!-- charset indica o conjunto de caracteres -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Permite apresentar uma melhor visualização em dispositivos móveis -->
    <title>Meu website</title>
    <!-- Título exibido na aba do navegador -->
</head>

<!-- Conteúdo do site - visível para o usuário -->
<body>
    <h1>Meu site</h1>
    <p>Bem-vindo ao meu site!</p>
</body>

</html>
