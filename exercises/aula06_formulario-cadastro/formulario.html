<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
</head>
<body>
    <header>
        <h1>Cadastro de Aluno - DSM</h1>
        <p>Formulário para cadastro de alunos da FATEC.</p>
    </header>
    <main>
        <form action="#" method="POST">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="nome">Nome Completo</label><br>
                <input type="text" name="name" id="name" placeholder="Insira seu nome completo" required><br><br>
                <label for="email">E-mail</label><br>
                <input type="email" name="email" id="email" placeholder="seuemail@email.com" required><br><br>
                <label for="datanascimento">Data de nascimento</label><br>
                <input type="date" name="datanascimento" id="datanascimento" required><br><br>
            </fieldset><br>
            <fieldset>
                <legend>Dados Acadêmicos</legend>
                <label for="curso">Curso</label><br>
                <select name="curso" id="curso">
                    <option value="dsm">DSM</option>
                    <option value="ads">ADS</option>
                    <option value="Outro">Outro</option>
                </select><br><br>
                <label for="periodo">Período</label><br>
                <input type="radio" name="periodo" id="manha" value="manha">Manhã
                <input type="radio" name="periodo" id="noite" value="noite">Noite <br><br>
                <label for="observacoes">Observações</label><br>
                <textarea name="observacoes" id="obs" rows="5" cols="40"></textarea>
            </fieldset><br>
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </form>
    </main>
</body>
</html>
