<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes no Classes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Demonstração de pseudo-classes</h1>
    <h2>:hover - É ativada quando o mouse passa sobre o elemento:</h2>
    <div class="caixa">
        Passe o mouse aqui
    </div>
    <br><br>

    <button class="btn-download">Download</button>
    <br><br>

    <h2>:focus - Clique nos campos</h2>
    <form>
        <input type="text" placeholder="Clique aqui para focar"><br><br>
        <input type="password" placeholder="Outro campo com focus">
    </form>
</body>
</html>
